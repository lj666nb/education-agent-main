<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
  <g id="header">
    <text x="56" y="76" font-family="Consolas, SimHei, 'Microsoft YaHei', monospace" font-size="56" font-weight="700" fill="#F0FAFF">四个断点，让个性化停留在“标签”</text>
    <text x="58" y="122" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="32" fill="#A9C4CF">教学数据没有连成持续服务，系统就只能反复从零开始</text>
  </g>
  <g id="broken-chain">
    <line x1="120" y1="284" x2="1160" y2="284" stroke="#1B4351" stroke-width="8" stroke-linecap="round"/>
    <line x1="252" y1="284" x2="332" y2="284" stroke="#FF7A90" stroke-width="8" stroke-dasharray="12 10"/>
    <line x1="512" y1="284" x2="592" y2="284" stroke="#FF7A90" stroke-width="8" stroke-dasharray="12 10"/>
    <line x1="772" y1="284" x2="852" y2="284" stroke="#FF7A90" stroke-width="8" stroke-dasharray="12 10"/>
  </g>
  <g id="problem-profile">
    <circle cx="188" cy="284" r="54" fill="#0E2530" stroke="#FF7A90" stroke-width="2"/>
    <use data-icon="phosphor-duotone/student" x="160" y="256" width="56" height="56" fill="#FF7A90"/>
    <text x="92" y="384" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F0FAFF">画像碎片化</text>
    <text x="92" y="430" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">偏好、掌握度与行为</text>
    <text x="92" y="463" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">分散在不同环节</text>
  </g>
  <g id="problem-resource">
    <circle cx="448" cy="284" r="54" fill="#0E2530" stroke="#FFD166" stroke-width="2"/>
    <use data-icon="phosphor-duotone/books" x="420" y="256" width="56" height="56" fill="#FFD166"/>
    <text x="352" y="384" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F0FAFF">资源供给慢</text>
    <text x="352" y="430" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">教师难以为每个学生</text>
    <text x="352" y="463" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">实时重组多模态内容</text>
  </g>
  <g id="problem-path">
    <circle cx="708" cy="284" r="54" fill="#0E2530" stroke="#3D7EFF" stroke-width="2"/>
    <use data-icon="phosphor-duotone/path" x="680" y="256" width="56" height="56" fill="#3D7EFF"/>
    <text x="612" y="384" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F0FAFF">路径静态化</text>
    <text x="612" y="430" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">课程顺序固定，无法随</text>
    <text x="612" y="463" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">知识差距动态调整</text>
  </g>
  <g id="problem-feedback">
    <circle cx="968" cy="284" r="54" fill="#0E2530" stroke="#00B8D9" stroke-width="2"/>
    <use data-icon="phosphor-duotone/chart-line-up" x="940" y="256" width="56" height="56" fill="#00B8D9"/>
    <text x="872" y="384" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F0FAFF">反馈不回流</text>
    <text x="872" y="430" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">练习结果没有驱动</text>
    <text x="872" y="463" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">下一次资源与策略</text>
  </g>
  <g id="so-what">
    <rect x="92" y="538" width="1076" height="92" rx="10" fill="#0E2530" stroke="#1B4351" stroke-width="1"/>
    <text x="128" y="595" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#FFD166">所以：必须把“人、内容、路径、评价”放进同一状态机</text>
  </g>
  <g id="footer">
    <text x="56" y="686" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#6F8D98">问题定义 · 个性化学习的系统性断点</text>
    <text x="1224" y="686" text-anchor="end" font-family="Consolas, 'Microsoft YaHei', monospace" font-size="18" fill="#6F8D98">03 / 20</text>
  </g>
</svg>
