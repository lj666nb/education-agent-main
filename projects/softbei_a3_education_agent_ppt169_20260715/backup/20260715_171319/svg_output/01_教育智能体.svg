    <path d="M 40 636 C 320 570 430 642 680 570 C 900 506 1030 536 1240 420" fill="none" stroke="#1B4351" stroke-width="2"/>
    <circle cx="1110" cy="112" r="148" fill="none" stroke="#1B4351" stroke-width="1" stroke-dasharray="8 4"/>
    <circle cx="1110" cy="112" r="94" fill="none" stroke="#00B8D9" stroke-width="2" stroke-opacity="0.35"/>
  </g>
