<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="cover">
  <defs>
    <linearGradient id="titleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00B8D9"/>
      <stop offset="100%" stop-color="#3D7EFF"/>
    </linearGradient>
    <radialGradient id="bgGlow" cx="78%" cy="28%" r="55%">
      <stop offset="0%" stop-color="#00B8D9" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#07131A" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="b"/>
      <feFlood flood-color="#00B8D9" flood-opacity="0.28" result="c"/>
      <feComposite in="c" in2="b" operator="in" result="g"/>
      <feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
