  <defs><marker id="feedbackArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="0,0 10,5 0,10" fill="#3D7EFF"/></marker></defs>
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
