<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <defs><radialGradient id="hubGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#3D7EFF" stop-opacity="0.24"/><stop offset="100%" stop-color="#07131A" stop-opacity="0"/></radialGradient></defs>
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
  <g id="header"><text x="56" y="74" font-family="Consolas, SimHei, 'Microsoft YaHei', monospace" font-size="56" font-weight="700" fill="#F0FAFF">前沿 AI 的价值，在于围绕同一状态协同</text><text x="58" y="118" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="32" fill="#A9C4CF">模型负责生成，编排负责协作，证据与关系负责约束，工程负责可用</text></g>
  <g id="spoke-lines" stroke="#1B4351" stroke-width="3"><line x1="640" y1="396" x2="640" y2="206"/><line x1="640" y1="396" x2="942" y2="256"/><line x1="640" y1="396" x2="942" y2="532"/><line x1="640" y1="396" x2="640" y2="590"/><line x1="640" y1="396" x2="338" y2="532"/><line x1="640" y1="396" x2="338" y2="256"/></g>
