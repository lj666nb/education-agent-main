<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <defs><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="0,0 10,5 0,10" fill="#00B8D9"/></marker></defs>
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
  <g id="header"><text x="56" y="74" font-family="Consolas, SimHei, 'Microsoft YaHei', monospace" font-size="56" font-weight="700" fill="#F0FAFF">生成过程可追踪，而不是黑盒等待</text><text x="58" y="118" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="32" fill="#A9C4CF">用户能看到进度、取消任务、回看结果，系统也能定位失败阶段</text></g>
  <g id="flow-connectors" stroke="#00B8D9" stroke-width="3" fill="none"><line x1="232" y1="300" x2="284" y2="300" marker-end="url(#arrow)"/><line x1="432" y1="300" x2="484" y2="300" marker-end="url(#arrow)"/><line x1="632" y1="300" x2="684" y2="300" marker-end="url(#arrow)"/><line x1="832" y1="300" x2="884" y2="300" marker-end="url(#arrow)"/><line x1="1032" y1="300" x2="1084" y2="300" marker-end="url(#arrow)"/></g>
  <g id="step-create"><circle cx="156" cy="300" r="76" fill="#0E2530" stroke="#00B8D9" stroke-width="2"/><text x="156" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#00B8D9">01</text><text x="156" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">创建任务</text><text x="156" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">POST /generate</text></g>
  <g id="step-id"><circle cx="356" cy="300" r="76" fill="#0E2530" stroke="#FFD166" stroke-width="2"/><text x="356" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#FFD166">02</text><text x="356" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">返回 task_id</text><text x="356" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">独立追踪标识</text></g>
  <g id="step-sse"><circle cx="556" cy="300" r="76" fill="#0E2530" stroke="#3D7EFF" stroke-width="2"/><text x="556" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#3D7EFF">03</text><text x="556" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">SSE 进度</text><text x="556" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">阶段与百分比</text></g>
  <g id="step-status"><circle cx="756" cy="300" r="76" fill="#0E2530" stroke="#00B8D9" stroke-width="2"/><text x="756" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#00B8D9">04</text><text x="756" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">状态查询</text><text x="756" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">GET /status</text></g>
  <g id="step-cancel"><circle cx="956" cy="300" r="76" fill="#0E2530" stroke="#FF7A90" stroke-width="2"/><text x="956" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#FF7A90">05</text><text x="956" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">主动取消</text><text x="956" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">异常可控</text></g>
  <g id="step-result"><circle cx="1156" cy="300" r="76" fill="#0E2530" stroke="#52D6A2" stroke-width="2"/><text x="1156" y="286" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#52D6A2">06</text><text x="1156" y="324" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">结果回看</text><text x="1156" y="416" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">列表与详情</text></g>
  <g id="trace-benefit"><rect x="150" y="500" width="980" height="94" rx="12" fill="#0E2530" stroke="#1B4351" stroke-width="1"/><use data-icon="phosphor-duotone/shield-check" x="186" y="523" width="48" height="48" fill="#52D6A2"/><text x="258" y="543" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#F0FAFF">可解释体验 + 可诊断工程</text><text x="258" y="578" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">同一条任务轨迹同时服务用户信任与开发运维</text></g>
  <g id="footer"><text x="56" y="686" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#6F8D98">实现证据：app/api/endpoints/agent.py</text><text x="1224" y="686" text-anchor="end" font-family="Consolas, 'Microsoft YaHei', monospace" font-size="18" fill="#6F8D98">08 / 20</text></g>
</svg>
