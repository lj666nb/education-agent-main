<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" data-pptx-page-role="content">
  <defs><marker id="cycleArrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto"><polygon points="0,0 10,5 0,10" fill="#00B8D9"/></marker><radialGradient id="centerGlow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#00B8D9" stop-opacity="0.18"/><stop offset="100%" stop-color="#07131A" stop-opacity="0"/></radialGradient></defs>
  <rect x="0" y="0" width="1280" height="720" fill="#07131A"/>
  <g id="header"><text x="56" y="74" font-family="Consolas, SimHei, 'Microsoft YaHei', monospace" font-size="56" font-weight="700" fill="#F0FAFF">个性化不是一次设置，而是持续更新</text><text x="58" y="118" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="32" fill="#A9C4CF">每次学习行为，都成为下一次生成与推荐的新依据</text></g>
  <g id="cycle-field"><circle cx="640" cy="400" r="270" fill="url(#centerGlow)"/><circle cx="640" cy="400" r="218" fill="none" stroke="#1B4351" stroke-width="2" stroke-dasharray="10 8"/></g>
  <g id="cycle-connectors" fill="none" stroke="#00B8D9" stroke-width="3"><path d="M 676 190 C 770 196 840 232 900 296" marker-end="url(#cycleArrow)"/><path d="M 942 342 C 962 430 930 502 854 556" marker-end="url(#cycleArrow)"/><path d="M 796 594 C 700 640 590 638 492 590" marker-end="url(#cycleArrow)"/><path d="M 432 550 C 356 500 326 426 348 340" marker-end="url(#cycleArrow)"/><path d="M 382 286 C 452 222 530 194 608 190" marker-end="url(#cycleArrow)"/></g>
  <g id="node-profile"><circle cx="640" cy="190" r="70" fill="#0E2530" stroke="#FFD166" stroke-width="2"/><text x="640" y="184" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#FFD166">01</text><text x="640" y="222" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">画像理解</text></g>
  <g id="node-generate"><circle cx="930" cy="330" r="70" fill="#0E2530" stroke="#3D7EFF" stroke-width="2"/><text x="930" y="324" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#3D7EFF">02</text><text x="930" y="362" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">资源生成</text></g>
  <g id="node-learn"><circle cx="820" cy="590" r="70" fill="#0E2530" stroke="#00B8D9" stroke-width="2"/><text x="820" y="584" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#00B8D9">03</text><text x="820" y="622" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">路径学习</text></g>
  <g id="node-evaluate"><circle cx="460" cy="590" r="70" fill="#0E2530" stroke="#52D6A2" stroke-width="2"/><text x="460" y="584" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#52D6A2">04</text><text x="460" y="622" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">效果评价</text></g>
  <g id="node-update"><circle cx="350" cy="330" r="70" fill="#0E2530" stroke="#FF7A90" stroke-width="2"/><text x="350" y="324" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#FF7A90">05</text><text x="350" y="362" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" font-weight="700" fill="#F0FAFF">画像更新</text></g>
  <g id="cycle-center"><circle cx="640" cy="400" r="122" fill="#0E2530" stroke="#00B8D9" stroke-width="3"/><use data-icon="phosphor-duotone/lightning" x="606" y="330" width="68" height="68" fill="#FFD166"/><text x="640" y="438" text-anchor="middle" font-family="Consolas, SimHei, 'Microsoft YaHei', sans-serif" font-size="36" font-weight="700" fill="#F0FAFF">可解释个性化</text><text x="640" y="476" text-anchor="middle" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="24" fill="#A9C4CF">状态持续进化</text></g>
  <g id="footer"><text x="56" y="686" font-family="'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="18" fill="#6F8D98">闭环价值：行为数据回流画像，画像反向约束生成</text><text x="1224" y="686" text-anchor="end" font-family="Consolas, 'Microsoft YaHei', monospace" font-size="18" fill="#6F8D98">10 / 20</text></g>
</svg>
