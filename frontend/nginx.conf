# ── Gzip 压缩配置 ──
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/javascript
  text/xml
  text/csv
  application/javascript
  application/json
  application/xml
  application/x-javascript
  application/atom+xml
  application/rss+xml
  image/svg+xml
  font/ttf
  font/otf
  font/woff2;

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 允许上传最大 50MB 的文件
    client_max_body_size 50M;

    # ── 静态资源缓存策略 ──
    # 带 hash 的 JS/CSS/字体/图片 → 长期缓存（1年）
    location ~* \.(js|css|woff2?|ttf|otf|png|jpg|jpeg|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        try_files $uri =404;
    }

    # HTML 文件 → 不缓存（SPA 需要最新版本）
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # Monaco editor workers → 短期缓存
    location /monaco-editor/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # API proxy (支持 SSE 流式)
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_connect_timeout 30s;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection '';
        chunked_transfer_encoding on;
    }

    # Swagger / OpenAPI
    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }
    location /api/v1/openapi.json {
        proxy_pass http://backend:8000/api/v1/openapi.json;
        proxy_set_header Host $host;
    }
    location /redoc-doc {
        proxy_pass http://backend:8000/redoc-doc;
        proxy_set_header Host $host;
    }
    location /health {
        proxy_pass http://backend:8000/health;
        proxy_set_header Host $host;
    }
    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;
    }

    # SPA fallback
    location / {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
