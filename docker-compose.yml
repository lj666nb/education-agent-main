version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: education_agent
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: ea-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: neo4j/12345678
    ports:
      - "7474:7474"   # HTTP (Browser UI)
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data

  mongodb:
    image: mongo:7
    container_name: ea-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: "123456"
      MONGO_INITDB_DATABASE: education_agent
    ports:
      - "27017:27017"
    volumes:
      - mongodbdata:/data/db
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ea-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      USE_SQLITE: "false"
      POSTGRES_SERVER: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: education_agent
      POSTGRES_PORT: "5432"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: "12345678"
      MONGODB_HOST: mongodb
      MONGODB_PORT: "27017"
      MONGODB_USER: root
      MONGODB_PASSWORD: "123456"
      MONGODB_DB: education_agent
      SECRET_KEY: education-agent-secret-key-change-in-production-2026
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      BCRYPT_COST_FACTOR: "12"
      LOGIN_MAX_FAILURES: "5"
      LOGIN_LOCKOUT_MINUTES: "15"
      DEEPSEEK_MODEL: deepseek-v4-pro
      DATA_DIR: /app/data
    volumes:
      - ./app:/app/app
      - ./requirements.txt:/app/requirements.txt
      - backenddata:/app/data
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      mongodb:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: ea-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  mongodbdata:
  backenddata:
