services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ea-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-education_agent}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 192m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ea-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    mem_limit: 64m
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: ea-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/change-me-neo4j}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 128m
    ports:
      - "7474:7474"   # HTTP (Browser UI)
      - "7687:7687"   # Bolt
    volumes:
      - neo4jdata:/data
    mem_limit: 768m
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:7474/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongodb:
    image: mongo:7
    container_name: ea-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-change-me-mongo}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-education_agent}
    ports:
      - "27017:27017"
    volumes:
      - mongodbdata:/data/db
    command: ["mongod", "--wiredTigerCacheSizeGB", "0.25"]
    mem_limit: 384m
    healthcheck:
      test: mongosh --eval 'db.runCommand("ping").ok' --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ea-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      TZ: Asia/Shanghai
      USE_SQLITE: "false"
      POSTGRES_SERVER: ${POSTGRES_SERVER:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-education_agent}
      POSTGRES_PORT: "5432"
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: "6379"
      REDIS_DB: "0"
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-change-me-neo4j}
      MONGODB_HOST: ${MONGODB_HOST:-mongodb}
      MONGODB_PORT: "27017"
      MONGODB_USER: ${MONGODB_USER:-root}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD:-change-me-mongo}
      MONGODB_DB: ${MONGODB_DB:-education_agent}
      SECRET_KEY: ${SECRET_KEY:-education-agent-secret-key-change-in-production-2026}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "1440"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      BCRYPT_COST_FACTOR: "12"
      LOGIN_MAX_FAILURES: "5"
      LOGIN_LOCKOUT_MINUTES: "15"
      DEEPSEEK_MODEL: deepseek-v4-pro
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: https://api.deepseek.com/v1
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      QWEN_BASE_URL: https://dashscope.aliyuncs.com/compatible-mode/v1
      QWEN_MODEL: qwen-plus
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DATA_DIR: /app/data
      CODE_RUNNER_SOCKET: /run/code-runner/runner.sock
    mem_limit: 512m
    env_file:
      - path: .env
        required: false
    volumes:
      - ./app:/app/app
      - ./migrations:/app/migrations:ro
      - ./requirements.txt:/app/requirements.txt
      - ./data:/app/data
      - ./uploads:/app/uploads
      - runner_socket:/run/code-runner
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_started
      mongodb:
        condition: service_healthy
      code-runner:
        condition: service_started

  code-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
    container_name: ea-code-runner
    restart: unless-stopped
    network_mode: none
    read_only: true
    tmpfs:
      - /tmp:size=128m,mode=1777
    volumes:
      - runner_socket:/run/code-runner
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    pids_limit: 64
    mem_limit: 320m
    cpus: 1.0

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend.dev
    container_name: ea-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - ./frontend/tsconfig.node.json:/app/tsconfig.node.json
      - ./frontend/public:/app/public
    environment:
      - VITE_API_PROXY=http://backend:8000
      # draw.io embed 地址（中国大陆用户可设置镜像地址加速访问）
      - VITE_DRAWIO_BASE_URL=https://embed.diagrams.net
    mem_limit: 768m
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  neo4jdata:
  mongodbdata:
  runner_socket:
